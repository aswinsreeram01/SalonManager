                            </h3>
                            <div id="hraAbsentWrap" style="overflow-x:auto;"></div>
                        </div>
                    </div>
                </div>

                        <button class="btn btn-primary" id="hraAdvLoadBtn" type="button">Refresh</button>
                    </div>
                    <div id="hraAdvLoading" style="display:none;text-align:center;padding:24px;color:#718096;">Loading…</div>

                            <h3 style="color:#2d3748;margin-bottom:12px;">

                                <span id="hraPendingAdvCount" style="margin-left:8px;background:#fed7d7;color:#c53030;font-size:12px;font-weight:600;padding:2px 10px;border-radius:12px;vertical-align:middle;">0</span>

                            </h3>
                            <div id="hraApprovedAdvWrap" style="overflow-x:auto;"></div>
