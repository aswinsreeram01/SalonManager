<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Salon Manager</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .reset-container {
      width: 100%;
      max-width: 400px;
    }
    
    .reset-box {
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1), 0 10px 20px rgba(0, 0, 0, 0.15);
      padding: 40px;
    }
    
    .reset-box h1 {
      font-size: 28px;
      color: #2d3748;
      margin-bottom: 8px;
      text-align: center;
    }
    
    .reset-box p {
      text-align: center;
      color: #718096;
      margin-bottom: 24px;
      font-size: 14px;
    }
    
    .message {
      padding: 12px 16px;
      border-radius: 4px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }
    
    .message.show {
      display: block;
    }
    
    .message.success {
      background: #c6f6d5;
      color: #22543d;
      border-left: 4px solid #48bb78;
    }
    
    .message.error {
      background: #fed7d7;
      color: #742a2a;
      border-left: 4px solid #f56565;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #2d3748;
      font-weight: 500;
      font-size: 14px;
    }
    
    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #cbd5e0;
      border-radius: 4px;
      font-size: 14px;
      transition: border-color 0.3s;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    .form-group input:disabled {
      background: #f7fafc;
      cursor: not-allowed;
    }
    
    .btn {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    .btn-primary {
      background: #667eea;
      color: white;
    }
    
    .btn-primary:hover:not(:disabled) {
      background: #5568d3;
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
    }
    
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    #resetForm {
      display: none;
    }
    
    #resetForm.show {
      display: block;
    }
    
    .loading-text {
      text-align: center;
      color: #718096;
      padding: 40px 0;
    }
    
    .back-link {
      text-align: center;
      margin-top: 20px;
    }
    
    .back-link a {
      color: #667eea;
      text-decoration: none;
      font-size: 14px;
    }
    
    .back-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="reset-container">
    <div class="reset-box">
      <h1>Reset Password</h1>
      <p>Enter your new password</p>
      
      <div id="message" class="message"></div>
      
      <div id="loadingText" class="loading-text">
        <p>Validating reset link...</p>
      </div>
      
      <form id="resetForm">
        <div class="form-group">
          <label for="newPassword">New Password</label>
          <input type="password" id="newPassword" required>
        </div>
        
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" required>
        </div>
        
        <button type="submit" class="btn btn-primary" id="resetBtn">
          Reset Password
        </button>
      </form>
      
      <div class="back-link">
        <a href="index.html">Back to Login</a>
      </div>
    </div>
  </div>
  
  <script>
    // Configuration
    const CONFIG = {
      API_URL: 'https://script.google.com/macros/s/AKfycbxXy0oJjS16PzhS9JlVxs9BoECOVNZIgmkHEWqZFHWJOi_vJY_rOqsCku9Cskeag0Vxag/exec'
    };
    
    let token = null;
    let email = null;
    
    // Extract token from URL on page load
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      token = urlParams.get('token');
      
      if (!token) {
        showMessage('Invalid or missing reset token. Please request a new one.', 'error');
        document.getElementById('loadingText').style.display = 'none';
      } else {
        validateToken();
      }
      
      document.getElementById('resetForm').addEventListener('submit', (e) => handleSubmit(e));
    });
    
    async function validateToken() {
      try {
        const response = await fetch(CONFIG.API_URL, {
          method: 'POST',
          body: JSON.stringify({
            action: 'validate_reset_token',
            token: token
          })
        });
        
        const result = await response.json();
        
        if (result.status === 'success') {
          email = result.email;
          document.getElementById('resetForm').classList.add('show');
          document.getElementById('loadingText').style.display = 'none';
          document.getElementById('newPassword').focus();
        } else {
          showMessage(result.message || 'Invalid or expired reset link', 'error');
          document.getElementById('loadingText').style.display = 'none';
        }
      } catch (error) {
        showMessage('Network error. Please check your connection and try again.', 'error');
        document.getElementById('loadingText').style.display = 'none';
      }
    }
    
    async function handleSubmit(e) {
      e.preventDefault();
      
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      
      if (newPassword !== confirmPassword) {
        showMessage('Passwords do not match', 'error');
        return;
      }
      
      if (newPassword.length < 6) {
        showMessage('Password must be at least 6 characters', 'error');
        return;
      }
      
      const resetBtn = document.getElementById('resetBtn');
      resetBtn.disabled = true;
      resetBtn.innerHTML = '<span class="spinner"></span>Resetting...';
      
      try {
        const response = await fetch(CONFIG.API_URL, {
          method: 'POST',
          body: JSON.stringify({
            action: 'reset_password',
            token: token,
            newPassword: newPassword
          })
        });
        
        const result = await response.json();
        
        if (result.status === 'success') {
          showMessage('Password reset successful! Redirecting to login...', 'success');
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 2000);
        } else {
          showMessage(result.message || 'Failed to reset password', 'error');
          resetBtn.disabled = false;
          resetBtn.innerHTML = 'Reset Password';
        }
      } catch (error) {
        showMessage('Network error. Please try again.', 'error');
        resetBtn.disabled = false;
        resetBtn.innerHTML = 'Reset Password';
      }
    }
    
    function showMessage(text, type) {
      const messageDiv = document.getElementById('message');
      messageDiv.textContent = text;
      messageDiv.className = `message ${type} show`;
    }
  </script>
</body>
</html>
