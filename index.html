<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salon Management System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/billing.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="css/setup.css">
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loader"></div>
    </div>

	<!-- Login Screen -->
    <div id="loginSection" class="login-container">
        <div class="login-box">
            <h1>Salon Manager</h1>
            <p class="subtitle">Sign in to access your dashboard</p>
            
            <div id="loginMessage" class="message"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" autocomplete="email" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" required>
                </div>
                
                <button type="submit" class="btn btn-primary" id="loginBtn" style="width: 100%;">
                    Login
                </button>
            </form>
            
            <div style="text-align: center; margin-top: 16px;">
                <a href="#" id="forgotPasswordLink" style="color: #667eea; text-decoration: none; font-size: 14px;">Forgot Password?</a>
            </div>

            <!-- Forgot Password Form (hidden by default) -->
            <div id="forgotPasswordForm" style="display: none; margin-top: 20px;">
                <h2 style="font-size: 20px; margin-bottom: 16px; color: #2d3748;">Reset Password</h2>
                <div class="form-group">
                    <label for="resetEmail">Email Address</label>
                    <input type="email" id="resetEmail" placeholder="Enter your email" required>
                </div>
                <button type="button" class="btn btn-primary" id="sendResetBtn" style="width: 100%; margin-bottom: 12px;">
                    Send Reset Link
                </button>
                <button type="button" class="btn btn-secondary" id="cancelResetBtn" style="width: 100%;">
                    Cancel
                </button>
            </div>
        </div>
    </div>
  
    <!-- Main App -->
	<div id="appSection" class="app-container" style="display: none;">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <button class="menu-toggle" id="menuToggle" aria-label="Toggle navigation">
                    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>
                <div id="pageTitleHeader" class="app-title">Salon Manager</div>
            </div>
            <div class="header-right">
                <div class="user-info">
                    <span id="userName" class="username"></span>
                    <a class="sheets-link-btn" id="sheetsBtn" href="#" target="_blank" style="display:none">📊 Sheets</a>
                    <button class="logout-btn" id="logoutBtn">Sign out</button>
                </div>
            </div>
        </div>

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <div class="sidebar-brand-name">Salon Manager</div>
                <div class="sidebar-brand-rule"></div>
            </div>
            <div class="nav-section">
                <button class="nav-item active" data-page="home"><span class="nav-icon">🏠</span>Home</button>
            </div>
            <div class="nav-section">
                <div class="nav-section-title">Operations</div>
                <button class="nav-item" data-page="billing"><span class="nav-icon">🧾</span>New Bill</button>
                <button class="nav-item" data-page="appointments"><span class="nav-icon">📅</span>Appointments</button>
                <button class="nav-item" data-page="history"><span class="nav-icon">📋</span>Bill History</button>
                <button class="nav-item" data-page="expenses"><span class="nav-icon">💸</span>Expenses</button>
            </div>
            <div class="nav-section">
                <div class="nav-section-title">Catalogue</div>
                <button class="nav-item" data-page="services"><span class="nav-icon">✂️</span>Services</button>
                <button class="nav-item" data-page="products"><span class="nav-icon">📦</span>Products</button>
                <button class="nav-item" data-page="vendors"><span class="nav-icon">🏪</span>Vendors</button>
            </div>
            <div class="nav-section">
                <div class="nav-section-title">People</div>
                <button class="nav-item" data-page="staff"><span class="nav-icon">👥</span>Staff & HR</button>
                <button class="nav-item" data-page="hrapprovals"><span class="nav-icon">✅</span>Approvals</button>
                <button class="nav-item" data-page="customers"><span class="nav-icon">🧑</span>Customers</button>
            </div>
            <div class="nav-section">
                <div class="nav-section-title">Admin</div>
                <button class="nav-item" data-page="organizations"><span class="nav-icon">🏢</span>Org & Config</button>
                <button class="nav-item" data-page="users"><span class="nav-icon">👤</span>Users</button>
                <button class="nav-item" data-page="roles"><span class="nav-icon">🛡️</span>Roles</button>
                <button class="nav-item" data-page="permissions"><span class="nav-icon">🔑</span>Permissions</button>
                <button class="nav-item" data-page="settings"><span class="nav-icon">⚙️</span>Sheet Setup</button>
            </div>
        </aside>
        <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

        <!-- Main Content -->
        <div class="main-content" id="mainContent">

            <!-- Home / Tile Grid -->
            <div class="content-section active" id="home">
                <div id="homeContent"></div>
            </div>

            <div class="content-section" id="dashboard"></div>
            <div class="content-section" id="services"></div>
            <div class="content-section" id="staff"></div>
            <div class="content-section" id="customers"></div>
            <div class="content-section" id="products"></div>
            <div class="content-section" id="vendors"></div>
            <div class="content-section" id="billing"></div>
            <div class="content-section" id="history"></div>
            <div class="content-section" id="appointments"></div>
            <div class="content-section" id="expenses"></div>
            <div class="content-section" id="users"></div>
            <div class="content-section" id="roles"></div>
            <div class="content-section" id="permissions"></div>
            <div class="content-section" id="organizations"></div>
            <div class="content-section" id="settings"></div>
            <div class="content-section" id="hrapprovals"></div>
        </div>
    </div>

    <!-- Bill Confirmation Modal -->
    <div id="billConfirmModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:2100;align-items:center;justify-content:center;">
        <div class="modal-box" style="max-width:480px;">
            <h3 style="color:#2d3748;margin-bottom:20px;">Confirm Bill</h3>
            <div id="billConfirmContent"></div>
            <div class="btn-group" style="margin-top:20px;">
                <button class="btn btn-primary" id="confirmSaveBtn" onclick="Billing._doSave()">Confirm &amp; Save</button>
                <button class="btn btn-secondary" onclick="Billing.closeConfirmation()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- New Customer Modal -->
    <div id="newCustomerModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:2000;align-items:center;justify-content:center;">
        <div class="modal-box">
            <h3 style="color:#2d3748;margin-bottom:20px;">Add New Customer</h3>
            <form id="newCustomerForm">
                <div class="form-group">
                    <label for="newCustomerName">Full Name*</label>
                    <input type="text" id="newCustomerName" placeholder="Customer name" required>
                </div>
                <div class="form-group">
                    <label for="newCustomerPhone">Phone*</label>
                    <input type="tel" id="newCustomerPhone" placeholder="Phone number" required>
                </div>
                <div class="btn-group">
                    <button type="submit" class="btn btn-primary" id="saveNewCustomerBtn">Save Customer</button>
                    <button type="button" class="btn btn-secondary" id="cancelNewCustomer">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Invoice Overlay -->
    <div id="invoiceOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:2000;align-items:flex-start;justify-content:center;overflow-y:auto;padding:40px 20px;">
        <div class="invoice-sheet">
            <div id="invoiceContent"></div>
            <div class="invoice-actions no-print">
                <button class="btn btn-primary" onclick="Billing.printInvoice()">Print / Save PDF</button>
                <button class="btn btn-secondary" onclick="Billing.openTemplateSettings()">Edit Template</button>
                <button class="btn btn-secondary" id="invoiceCloseBtn" onclick="Billing.closeInvoice()">Close &amp; New Bill</button>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation (replaced by sidebar) -->
    <nav class="bottom-nav" id="bottomNav" style="display:none">
        <button class="bottom-nav-btn active" data-page="home">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
            </svg>
            Home
        </button>
        <button class="bottom-nav-btn" data-page="billing">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 14l6-6m-5.5.5h.01m4.99 5h.01M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16l3.5-2 3.5 2 3.5-2 3.5 2z"/>
            </svg>
            New Bill
        </button>
        <button class="bottom-nav-btn" data-page="appointments">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
            Appts
        </button>
        <button class="bottom-nav-btn" data-page="staff">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
            Staff
        </button>
    </nav>

    <!-- Invoice Template Settings Modal -->
    <div id="invoiceSettingsModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:3000;align-items:center;justify-content:center;">
        <div class="modal-box" style="max-width:440px;width:100%;">
            <h3 style="color:#2d3748;margin-bottom:20px;">Invoice Template</h3>
            <div class="form-group">
                <label for="invSetSalonName">Salon Name</label>
                <input type="text" id="invSetSalonName" placeholder="Salon Manager">
            </div>
            <div class="form-group">
                <label for="invSetAddress">Address</label>
                <textarea id="invSetAddress" placeholder="123 Main St&#10;City, State — 600001" rows="2" style="resize:vertical;"></textarea>
            </div>
            <div class="form-group">
                <label for="invSetPhone">Phone</label>
                <input type="text" id="invSetPhone" placeholder="+91 98765 43210">
            </div>
            <div class="form-group">
                <label for="invSetGstNumber">GST Number</label>
                <input type="text" id="invSetGstNumber" placeholder="29XXXXX1234X1ZX">
            </div>
            <div class="form-group">
                <label for="invSetFooterText">Footer Message</label>
                <input type="text" id="invSetFooterText" placeholder="Thank you for your visit!">
            </div>
            <div class="btn-group" style="margin-top:8px;">
                <button class="btn btn-primary" onclick="Billing.saveTemplateSettings()">Save</button>
                <button class="btn btn-secondary" onclick="document.getElementById('invoiceSettingsModal').style.display='none'">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Appointment Booking Modal -->
    <div id="apptBookingModal" class="modal-overlay" style="display:none;">
        <div class="modal-box" style="max-width:520px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
                <h3 id="apptModalTitle" style="color:#2d3748;font-size:18px;font-weight:700;">New Appointment</h3>
                <button id="apptModalClose" style="background:none;border:none;font-size:22px;cursor:pointer;color:#a0aec0;line-height:1;padding:2px 6px;">✕</button>
            </div>
            <div id="apptModalMsg" class="message"></div>
            <form id="apptBookingForm" autocomplete="off">
                <!-- Customer phone lookup -->
                <div class="form-group">
                    <label for="apptCustPhone">Customer Phone *</label>
                    <input type="tel" id="apptCustPhone" placeholder="Enter phone number" inputmode="numeric" autocomplete="off" required>
                    <div id="apptCustInfo" class="appt-cust-info"></div>
                </div>
                <!-- Inline new-customer form (hidden until needed) -->
                <div id="apptNewCustBox" class="appt-new-cust-box" style="display:none;">
                    <div class="appt-new-cust-row">
                        <div class="form-group" style="margin-bottom:0;flex:1;min-width:0;">
                            <label for="apptNewCustName">New Customer Name *</label>
                            <input type="text" id="apptNewCustName" placeholder="Full name">
                        </div>
                        <div class="appt-new-cust-btns">
                            <button type="button" class="btn btn-primary" id="apptSaveNewCust" style="padding:8px 16px;font-size:13px;">Add</button>
                            <button type="button" class="btn btn-secondary" id="apptCancelNewCust" style="padding:8px 10px;font-size:13px;">✕</button>
                        </div>
                    </div>
                </div>
                <!-- Service -->
                <div class="form-group">
                    <label for="apptService">Service *</label>
                    <select id="apptService" required>
                        <option value="">Select service…</option>
                    </select>
                </div>
                <!-- Staff -->
                <div class="form-group">
                    <label for="apptStaff">Staff *</label>
                    <select id="apptStaff" required>
                        <option value="">Select staff…</option>
                    </select>
                </div>
                <!-- Date + Time -->
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
                    <div class="form-group">
                        <label for="apptDate">Date *</label>
                        <input type="date" id="apptDate" required>
                    </div>
                    <div class="form-group">
                        <label>Start Time *</label>
                        <div style="display:flex;gap:6px;">
                            <select id="apptHour" required style="flex:1;"></select>
                            <select id="apptMinute" required style="width:72px;">
                                <option value="00">:00</option>
                                <option value="15">:15</option>
                                <option value="30">:30</option>
                                <option value="45">:45</option>
                            </select>
                        </div>
                    </div>
                </div>
                <!-- Duration -->
                <div class="form-group">
                    <label for="apptDuration">Duration (minutes) *</label>
                    <input type="number" id="apptDuration" min="15" step="15" value="60" required>
                </div>
                <!-- Notes -->
                <div class="form-group">
                    <label for="apptNotes">Notes</label>
                    <textarea id="apptNotes" rows="2" placeholder="Optional notes…"></textarea>
                </div>
                <div class="btn-group" style="margin-top:4px;">
                    <button type="submit" class="btn btn-primary" id="apptSaveBtn">Book Appointment</button>
                    <button type="button" class="btn btn-secondary" id="apptCancelFormBtn">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/services.js"></script>
    <script src="js/staff.js"></script>
    <script src="js/customers.js"></script>
    <script src="js/pricebooks.js"></script>
    <script src="js/products.js"></script>
    <script src="js/servicegroups.js"></script>
    <script src="js/organizations.js"></script>
    <script src="js/users.js"></script>
    <script src="js/roles.js"></script>
    <script src="js/permissions.js"></script>
    <script src="js/billing.js"></script>
    <script src="js/history.js"></script>
    <script src="js/appointments.js"></script>
    <script src="js/expenses.js"></script>
    <script src="js/vendors.js"></script>
    <script src="js/app.js"></script>
    <script src="js/productgroups.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/hrapprovals.js"></script>

</body>
</html>
