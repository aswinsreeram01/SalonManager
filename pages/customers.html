                <div class="page-header">
                    <h1 class="page-title">Customers</h1>
                    <p class="page-subtitle">Manage customer information</p>
                </div>
                
                <div id="customerMessage" class="message"></div>
                
                <div class="card">
                    <h3 style="margin-bottom: 16px; color: #2d3748;">Add New Customer</h3>
                    <form id="customerForm">
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 16px;">
                            <div class="form-group">
                                <label for="customerName">Name*</label>
                                <input type="text" id="customerName" required>
                            </div>
                            <div class="form-group">
                                <label for="customerPhone">Phone*</label>
                                <input type="tel" id="customerPhone" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary" id="saveCustomerBtn">Add Customer</button>
                    </form>
                </div>
                
                <div class="card">
                    <h3 style="margin-bottom: 16px; color: #2d3748;">Customer List</h3>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Date Added</th>
                                    <th>Name</th>
                                    <th>Phone</th>
                                    <th>Added By</th>
                                </tr>
                            </thead>
                            <tbody id="customersTableBody">
                                <tr>
                                    <td colspan="4" style="text-align: center; color: #a0aec0;">Loading customers...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
